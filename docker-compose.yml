x-agent-base: &agent-base
  image: ${DCLAUDE_IMAGE_NAME:-dclaude:local}
  build:
    context: .
    args:
      NODE_MAJOR: ${NODE_MAJOR:-22}
      CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.83}
      CODEX_VERSION: ${CODEX_VERSION:-0.117.0}
  init: true
  stdin_open: true
  tty: true
  user: "${HOST_UID:?set HOST_UID}:${HOST_GID:?set HOST_GID}"
  working_dir: ${CURRENT_PATH:?set CURRENT_PATH}
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-common-environment: &common-environment
  HOME: ${HOST_HOME:?set HOST_HOME}
  PROJECT_ROOT: ${PROJECT_ROOT:?set PROJECT_ROOT}
  PIP_CACHE_DIR: ${HOST_HOME:?set HOST_HOME}/.cache/pip
  UV_CACHE_DIR: ${HOST_HOME:?set HOST_HOME}/.cache/uv
  TERM: ${TERM:-xterm-256color}
  COLORTERM: ${COLORTERM:-truecolor}

services:
  dclaude:
    <<: *agent-base
    environment:
      <<: *common-environment
      DISABLE_AUTOUPDATER: "1"
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:?set PROJECT_ROOT}
        target: ${PROJECT_ROOT:?set PROJECT_ROOT}
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Desktop
        target: ${HOST_HOME:?set HOST_HOME}/Desktop
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Downloads
        target: ${HOST_HOME:?set HOST_HOME}/Downloads
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/pip
        target: ${HOST_HOME:?set HOST_HOME}/.cache/pip
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/uv
        target: ${HOST_HOME:?set HOST_HOME}/.cache/uv
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.claude
        target: ${HOST_HOME:?set HOST_HOME}/.claude
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.config/claude-code
        target: ${HOST_HOME:?set HOST_HOME}/.config/claude-code
    command:
      - /bin/bash
      - -lc
      - ln -sfn "$PROJECT_ROOT" /var/run/dclaude/workspace && exec claude --dangerously-skip-permissions

  dcodex:
    <<: *agent-base
    environment:
      <<: *common-environment
      CODEX_HOME: ${HOST_HOME:?set HOST_HOME}/.codex
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:?set PROJECT_ROOT}
        target: ${PROJECT_ROOT:?set PROJECT_ROOT}
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Desktop
        target: ${HOST_HOME:?set HOST_HOME}/Desktop
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Downloads
        target: ${HOST_HOME:?set HOST_HOME}/Downloads
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/pip
        target: ${HOST_HOME:?set HOST_HOME}/.cache/pip
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/uv
        target: ${HOST_HOME:?set HOST_HOME}/.cache/uv
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.codex
        target: ${HOST_HOME:?set HOST_HOME}/.codex
    command:
      - /bin/bash
      - -lc
      - ln -sfn "$PROJECT_ROOT" /var/run/dclaude/workspace && exec codex --dangerously-bypass-approvals-and-sandbox

  dclaude-ssh:
    <<: *agent-base
    profiles:
      - ssh
    environment:
      <<: *common-environment
      DISABLE_AUTOUPDATER: "1"
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:?set PROJECT_ROOT}
        target: ${PROJECT_ROOT:?set PROJECT_ROOT}
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Desktop
        target: ${HOST_HOME:?set HOST_HOME}/Desktop
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Downloads
        target: ${HOST_HOME:?set HOST_HOME}/Downloads
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/pip
        target: ${HOST_HOME:?set HOST_HOME}/.cache/pip
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/uv
        target: ${HOST_HOME:?set HOST_HOME}/.cache/uv
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.claude
        target: ${HOST_HOME:?set HOST_HOME}/.claude
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.config/claude-code
        target: ${HOST_HOME:?set HOST_HOME}/.config/claude-code
      - type: bind
        source: /run/host-services/ssh-auth.sock
        target: /run/host-services/ssh-auth.sock
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.ssh/known_hosts
        target: ${HOST_HOME:?set HOST_HOME}/.ssh/known_hosts
        read_only: true
    command:
      - /bin/bash
      - -lc
      - ln -sfn "$PROJECT_ROOT" /var/run/dclaude/workspace && exec claude --dangerously-skip-permissions

  dcodex-ssh:
    <<: *agent-base
    profiles:
      - ssh
    environment:
      <<: *common-environment
      CODEX_HOME: ${HOST_HOME:?set HOST_HOME}/.codex
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:?set PROJECT_ROOT}
        target: ${PROJECT_ROOT:?set PROJECT_ROOT}
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Desktop
        target: ${HOST_HOME:?set HOST_HOME}/Desktop
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/Downloads
        target: ${HOST_HOME:?set HOST_HOME}/Downloads
        read_only: true
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/pip
        target: ${HOST_HOME:?set HOST_HOME}/.cache/pip
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.cache/uv
        target: ${HOST_HOME:?set HOST_HOME}/.cache/uv
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.codex
        target: ${HOST_HOME:?set HOST_HOME}/.codex
      - type: bind
        source: /run/host-services/ssh-auth.sock
        target: /run/host-services/ssh-auth.sock
      - type: bind
        source: ${HOST_HOME:?set HOST_HOME}/.ssh/known_hosts
        target: ${HOST_HOME:?set HOST_HOME}/.ssh/known_hosts
        read_only: true
    command:
      - /bin/bash
      - -lc
      - ln -sfn "$PROJECT_ROOT" /var/run/dclaude/workspace && exec codex --dangerously-bypass-approvals-and-sandbox
